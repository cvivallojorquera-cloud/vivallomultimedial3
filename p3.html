<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Contacto</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>

body{
  margin: 0;
  background-color: #0A0F1C;
  height: 100vh;
  overflow: hidden;
}

/* FONDO */
body::before{
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: url("img/Fondo.jpg");
  background-size: cover;
  background-position: center;
  opacity: 0.5;
  z-index: -1;
}

/* MARCO */
body::after{
  content:"";
  position: fixed;
  top: 15px;
  left: 15px;
  width: calc(100% - 30px);
  height: calc(100% - 30px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 
    0 0 10px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.03);
  pointer-events: none;
}

/* CONTENEDOR CENTRAL */
.contacto{
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* TITULO */
.title{
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  
  font-family: 'Pirata One', cursive;
  font-size: 60px;
  color: white;
}

/* FOTO */
.foto{
  width: 180px;
  height: 180px;
  border-radius: 50%;
  object-fit: cover;

  filter: grayscale(100%) contrast(120%);
  transition: 0.4s;
}

.foto:hover{
  filter: grayscale(0%);
}

/* LINKS */
.links{
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 30px;
}

.links a{
  color: white;
  font-size: 22px;
  text-decoration: none;
  letter-spacing: 2px;

  border: 1px solid rgba(255,255,255,0.2);
  padding: 10px 25px;

  font-family: 'Pirata One', cursive;

  transition: 0.4s;
  animation: respirar 4s infinite;
}

.links a:hover{
  border-color: white;
  transform: scale(1.05);
}

/* BOTÓN VOLVER ABAJO */
.volver{
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
}

.volver a{
  color: white;
  font-size: 20px;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 8px 20px;
  font-family: 'Pirata One', cursive;
}

/* ANIMACIÓN */
@keyframes respirar{
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

</style>
</head>

<body>

<div class="title">CONTACTO</div>

<div class="contacto">

  <img src="img/contacto.jpg" class="foto">

  <div class="links">
    <a href="https://instagram.com/thekissofjuddas" target="_blank">Instagram</a>

    <a href="https://mail.google.com/mail/?view=cm&fs=1&to=vivallo.c16@gmail.com" target="_blank">
      Correo
    </a>
  </div>

</div>

<div class="volver">
  <a href="index.html">Volver</a>
</div>

</body>
</html>
