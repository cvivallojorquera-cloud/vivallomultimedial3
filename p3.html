<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Contacto</title>
<!-- TIPOGRAFIA -->
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
<style>


body{
  margin: 0;
  background-color: #1e0e9aa1;
  position: relative;
  z-index: 0;
}


body::before{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url("img/contacto.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  opacity: 0.5;

  z-index: -1;
}

/*TITULO*/
.title{
  color: rgb(255, 255, 255);
  margin: 0;
  height: 30vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Pirata One', cursive;
  font-size: 60px;
}
/* MARCO */
body::after{
  content:"";
  position: fixed;
  top: 15px;
  left: 15px;
  width: calc(100% - 30px);
  height: calc(100% - 30px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 
    0 0 10px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.03);
  pointer-events: none;
}

.contacto{
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}


.foto{
  width: 200px;
  height: 200px;
  border-radius: 50%;
  object-fit: cover;
  margin: 20px 0;
}


.links{
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-top: 20px;
}

.links a{
  color: rgb(147, 215, 235);
  font-size: 22px;
  text-decoration: none;
  background-color: #8a87e9b9;
  padding: 10px 20px;
  text-align: center;
}


.volver{
  display: flex;
  justify-content: center;
  margin: 40px;
}

.volver a{
  color: rgb(147, 215, 235);
  font-size: 25px;
  text-decoration: none;
  background-color: #8a87e9b9;
  padding: 10px 20px;
}

</style>

</head>

<body>

<div class="title">
  <h1>CONTACTO</h1>
</div>

<div class="contacto">


  <img src="img/m11.jpg" class="foto">

 
  <div class="links">
    <a href="https://instagram.com/thekissofjuddas" target="_blank">Instagram</a>
   <a href="https://mail.google.com/mail/?view=cm&fs=1&to=vivallo.c16@gmail.com" target="_blank">
  Correo
</a>
  </div>

</div>


<div class="volver">
  <a href="index.html">Volver</a>
</div>

</body>

</html>
