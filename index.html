<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Multimedial</title>

<!-- TIPOGRAFÍA GÓTICA -->
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
  margin: 0;
  background-color: #0a0a0a;
  font-family: 'Cinzel', serif;
  overflow-x: hidden;
}

/* FONDO */
body::before{
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: url("img/m10.jpg");
  background-size: cover;
  background-position: center;
  opacity: 0.25;
  z-index: -2;
}

/* TEXTURA */
body::after{
  content:"";
  position: fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 3px 3px;
  z-index:-1;
}

/* SECCIÓN */
.section{
  height: 120vh;
  position: relative;
}

/* TITULO PRINCIPAL */
.title{
  position: absolute;
  top: 20%;
  left: 10%;
  font-size: 90px;
  color: white;
  font-family: 'UnifrakturCook', cursive;
}

/* NOMBRE */
.title2{
  position: absolute;
  top: 40%;
  left: 12%;
  font-size: 30px;
  color: #ddd;
}

/* TEXTO */
.parra1{
  position: absolute;
  top: 65%;
  left: 10%;
  max-width: 400px;
  font-size: 18px;
  line-height: 1.6;
  color: #ccc;
}

/* LINKS COMO OBJETOS */
.link{
  position: absolute;
  font-size: 22px;
  text-decoration: none;
  color: #bbb;
  transition: 0.4s;
}

.link:hover{
  color: white;
  transform: scale(1.05);
}

/* POSICIONES (ESTILO LIBRE) */
.obra{
  top: 30%;
  right: 15%;
}

.galeria{
  top: 60%;
  right: 25%;
}

.contacto{
  top: 80%;
  right: 10%;
}

/* IMÁGENES FLOTANTES */
.img{
  position: absolute;
  width: 280px;
  filter: grayscale(100%) contrast(120%);
  transition: 0.5s;
}

.img:hover{
  filter: grayscale(0%);
  transform: scale(1.03);
}

.img1{
  top: 25%;
  left: 55%;
}

.img2{
  top: 65%;
  left: 40%;
}

</style>
</head>

<body>

<div class="section">

  <div class="title">MULTIMEDIAL</div>

  <div class="title2">Kevin Vivallo</div>

  <div class="parra1">
    Artista visual enfocado en la exploración del cuerpo, la materia y lo ritual.  
    La imagen se construye como fragmento, como residuo de una experiencia interna.
  </div>

  <!-- LINKS COMO COMPOSICIÓN -->
  <a href="p1.html" class="link obra">Obra</a>
  <a href="p2.html" class="link galeria">Galería</a>
  <a href="p3.html" class="link contacto">Contacto</a>

  <!-- IMÁGENES -->
  <img src="img/m10.jpg" class="img img1">
  <img src="img/m10.jpg" class="img img2">

</div>

</body>
</html>
