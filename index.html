<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Portafolio</title>

<!-- FUENTE GOTICA LEGIBLE -->
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
  <style>

body{
  margin: 0;
  background-color: #0A0F1C;
  position: relative;
  z-index: 0;
}

/* Fondo con imagen */
body::before{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url("img/m10.jpg"); 
  background-size: cover; 
  background-position: center;
  background-repeat: no-repeat;

  opacity: 0.5; 
  z-index: -1; 
}

body::after{
  content:"";
  position: fixed;
  top: 15px;
  left: 15px;
  width: calc(100% - 30px);
  height: calc(100% - 30px);

  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 
    0 0 10px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.03);

  pointer-events: none;
}
    
/* TITULO PRINCIPAL */
.title {
  font-family: 'Pirata One', cursive;
  font-size: 80px;
  letter-spacing: 2px;
 color: rgb(255, 255, 255);
 margin: 0;
 height: 50vh;
 display: flex;
 justify-content: center;
 align-items: center;
}
  
/* SUBTITULO */
.title2{
  position: absolute;
  top: 30%; /* ajusta este valor para subir/bajar */
  left: 50%;
  transform: translate(-50%, -50%);

  color: white;
  margin: 0;

  font-family: 'Cinzel', serif;
  font-size: 17px;
}

/* TEXTO ARTISTA */
.parra1{

 background-color: transparent;

 color: rgb(255, 255, 255);

 margin: 0;

 height: 40vh;

 display:flex;

 justify-content: center;

 align-items: center;

 /* FUENTE GOTICA */
font-family: 'Special Elite', monospace;

 font-size: 30px;

}

/* CONTENEDOR EN LA PARTE INFERIOR */
.botones{
  position: relative;
  bottom: 40px; /* distancia desde abajo */
  left: 50%;
  transform: translaeY(-50%);

  display: flex-start;
  gap: 40px;
  justify-content: center;
  align-items: center;
}

/* BOTONES */
. color: rgb(255, 255, 255);
 margin: 0;
 height: 10vh;
 display:flex;
 justify-content: center;
 align-items: center;
  font-family: 'Pirata One', cursive;
  font-size: 22px;
  letter-spacing: 2px;
  transition: all 0.4s ease;
  animation: respirar 4s ease-in-out infinite;
}

/* HOVER */
.parra2:hover{
  border-color: white;
  transform: scale(1.05);
}

/* EVITA CAMBIO DE COLOR AL CLICK */
.parra2:visited,
.parra2:active,
.parra2:focus{
  color: white;
  background: transparent;
  outline: none;

/* CLICK  */
.parra2:active,
.parra2:focus,
.parra2:visited{
  color: white;
  outline: none;
  background: transparent;
}

/* ANIMACIÓN RESPIRAR */
@keyframes respirar{
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

</style>

</head>

<body>

<div class="title">
<h1>Portafolio</h1>
</div>

<div class="title2">
<h2>thekissofjuddas</h2>
</div>

<div class="parra1">
<h2>Artista Visual</h2>
</div>

</div>

<div class="parra2">

</div>

<div class="parra2">

</div>

</body>

</html>
