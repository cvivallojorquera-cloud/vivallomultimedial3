<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Portafolio</title>

<!-- FUENTE GOTICA LEGIBLE -->
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
  <style>

body{
  margin: 0;
  background-color: #0A0F1C;
  position: relative;
  z-index: 0;
}

/* Fondo con imagen */
body::before{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url("img/m10.jpg"); 
  background-size: cover; 
  background-position: center;
  background-repeat: no-repeat;

  opacity: 0.5; 
  z-index: -1; 
}

body::after{
  content:"";
  position: fixed;
  top: 15px;
  left: 15px;
  width: calc(100% - 30px);
  height: calc(100% - 30px);

  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 
    0 0 10px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.03);

  pointer-events: none;
}
    
/* TITULO PRINCIPAL */
.title {
  font-family: 'Pirata One', cursive;
  font-size: 80px;
  letter-spacing: 2px;
 color: rgb(255, 255, 255);
 margin: 0;
 height: 50vh;
 display: flex;
 justify-content: center;
 align-items: center;
}
  
/* SUBTITULO */
.title2{
  position: absolute;
  top: 30%; /* ajusta este valor para subir/bajar */
  left: 50%;
  transform: translate(-50%, -50%);

  color: white;
  margin: 0;

  font-family: 'Cinzel', serif;
  font-size: 17px;
}

/* TEXTO ARTISTA */
.parra1{

 background-color: transparent;

 color: rgb(255, 255, 255);

 margin: 0;

 height: 40vh;

 display:flex;

 justify-content: center;

 align-items: center;

 /* FUENTE GOTICA */
font-family: 'Special Elite', monospace;

 font-size: 30px;

}

/* CONTENEDOR */
.botones{
  display: flex;
  justify-content: center; /* centra todo */
  gap: 80px; /* espacio entre botones */
  margin-top: 0px;
}

/* BOTONES */
.parra2{
  color: white;
  padding: 15px 30px; /* en vez de height */
  text-decoration: none;
  display: inline-flex;
  justify-content: center;
  align-items: center;

  font-family: 'Special Elite', monospace;
  font-size: 20px;

  transition: 0.3s;
}

/* HOVER (recomendado) */
.parra2:hover{
  background-color: #a9a6ff;
  color: black;
}

</style>

</head>

<body>

<div class="title">
<h1>Portafolio</h1>
</div>

<div class="title2">
<h2>thekissofjuddas</h2>
</div>

<div class="parra1">
<h2>Artista Visual</h2>
</div>

<div class="parra2">

</div>

<div class="parra2">

</div>

<div class="parra2">

</div>

</body>

</html>
