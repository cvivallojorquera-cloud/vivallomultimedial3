<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Multimedial</title>

<!-- TIPOGRAFÍA -->
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
  margin:0;
  background:black;
  color:white;
  font-family:'Cinzel', serif;
  overflow:hidden;
}

/* IMAGEN DE FONDO */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background-image:url("img/m10.jpg");
  background-size:cover;
  background-position:center;
  filter:grayscale(100%) brightness(0.4) contrast(120%);
}

/* CAPA OSCURA */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

/* CONTENIDO CENTRADO */
.container{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* TITULO */
h1{
  font-family:'UnifrakturCook', cursive;
  font-size:80px;
  margin:0;
  letter-spacing:2px;
}

/* SUBTITULO */
h2{
  font-size:18px;
  font-weight:400;
  color:#ccc;
  margin-top:10px;
}

/* BOTÓN MINIMAL */
.statement{
  margin-top:60px;
  font-size:14px;
  text-decoration:none;
  color:#aaa;
  border:1px solid #444;
  padding:10px 25px;
  transition:0.4s;
}

.statement:hover{
  color:white;
  border-color:white;
}
/* BOTÓN MINIMAL 2 */
.galeria{
  margin-top:60px;
  font-size:14px;
  text-decoration:none;
  color:#aaa;
  border:1px solid #444;
  padding:10px 25px;
  transition:0.4s;
}

.galeria:hover{
  color:white;
  border-color:white;
}
/* DETALLE SUTIL (RESPIRACIÓN) */
.enter{
  animation: fade 3s infinite alternate;
}

@keyframes fade{
  from{opacity:0.4;}
  to{opacity:1;}
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
  <h1>MULTIMEDIAL</h1>
  <h2>Kevin Vivallo</h2>

  <a href="p1.html" class="enter">Entrar</a>
</div>

</body>
</html>

</body>
</html>
