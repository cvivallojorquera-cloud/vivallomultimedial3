<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Portafolio</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>

body{
  margin: 0;
  background-color: #0A0F1C;
  position: relative;
  height: 100vh;
  overflow: hidden;
}

/* FONDO */
body::before{
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: url("img/m10.jpg"); 
  background-size: cover;
  background-position: center;
  opacity: 0.5;
  z-index: -1;
}

/* MARCO */
body::after{
  content:"";
  position: fixed;
  top: 15px;
  left: 15px;
  width: calc(100% - 30px);
  height: calc(100% - 30px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 
    0 0 10px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.03);
  pointer-events: none;
}

/* TITULO */
.title {
  font-family: 'Pirata One', cursive;
  font-size: 80px;
  color: white;
  height: 50vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* SUBTITULO */
.title2{
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-family: 'Cinzel', serif;
  font-size: 17px;
}

/* STATEMENT */
.parra1{
  color: white;
  height: 40vh;
  display:flex;
  justify-content: center;
  align-items: center;
  font-family: 'Special Elite', monospace;
  font-size: 30px;
}

/* CONTENEDOR BOTONES */
.botones{
  position: absolute;
  bottom: 40px;
  left: 50px;
  display: flex;
  gap: 30px;
}

/* BOTONES */
.parra2{
  color: white;
  text-decoration: none;

  padding: 10px 20px;

  font-family: 'Pirata One', cursive;
  font-size: 22px;
  letter-spacing: 2px;

  border: 1px solid rgba(255,255,255,0.2);

  transition: 0.4s;

  animation: respirar 4s ease-in-out infinite;
}

/* HOVER */
.parra2:hover{
  border-color: white;
  transform: scale(1.05);
}

/* CLICK */
.parra2:visited,
.parra2:active,
.parra2:focus{
  color: white;
  background: transparent;
  outline: none;
}

/* ANIMACIÓN */
@keyframes respirar{
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

</style>

</head>

<body>

<div class="title">
  <h1>Portafolio</h1>
</div>

<div class="title2">
  <h2>thekissofjuddas</h2>
</div>

<div class="parra1">
  <h2>Artista Visual</h2>
</div>

<!-- BOTONES CORRECTAMENTE AGRUPADOS -->
<div class="botones">
  <a href="p1.html" class="parra2">Obra</a>
  <a href="p2.html" class="parra2">Galería</a>
  <a href="p3.html" class="parra2">Contacto</a>
</div>

</body>
</html>
