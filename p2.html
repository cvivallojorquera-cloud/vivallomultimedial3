<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Galería</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>

body{
  margin: 0;
  background-color: #0A0F1C;
}

/* FONDO */
body::before{
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: url("img/Fondo.jpg");
  background-size: cover;
  background-position: center;
  opacity: 0.5;
  z-index: -1;
}

/* MARCO */
body::after{
  content:"";
  position: fixed;
  top: 15px;
  left: 15px;
  width: calc(100% - 30px);
  height: calc(100% - 30px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 
    0 0 10px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.03);
  pointer-events: none;
}

/* TITULO */
.title{
  color: white;
  height: 15vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Pirata One', cursive;
  font-size: 60px;
}

/* GALERIA */
.galeria{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
  gap: 20px;
  padding: 40px;
  margin: 40px;
  background-color: rgba(0,0,0,0.25);
}

/* IMAGENES */
.galeria img{
  width: 100%;
  height: 250px;
  object-fit: cover;

  filter: grayscale(100%);
  transition: 0.4s;
  cursor: pointer;
}

.galeria img:hover{
  filter: grayscale(0%);
  transform: scale(1.03);
}

/* MODAL (ARREGLADO) */
.modal{
  display: none;
  position: fixed;
  inset: 0; /* 🔥 mejor que top/left */

  background: rgba(0,0,0,0.95);

  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;

  z-index: 9999; /* 🔥 CLAVE */
}

/* IMAGEN GRANDE */
.modal img{
  max-width: 80%;
  max-height: 60vh;
}

/* TEXTO */
.modal p{
  color: white;
  margin-top: 20px;
  font-family: 'Pirata One', cursive;
  font-size: 20px;
}

/* VOLVER */
.volver{
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
}

.volver a{
  color: white;
  font-size: 22px;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 20px;
  font-family: 'Pirata One', cursive;
  transition: 0.4s;
}

.volver a:hover{
  border-color: white;
  transform: scale(1.05);
}

</style>

</head>

<body>

<div class="title">
  <h1>GALERÍA</h1>
</div>

<div class="galeria">

  <img src="img/m1.jpg" onclick="abrirModal(this)" data-info="Obra 1<br>2024<br>"Carboncillo sobre papel">
  <img src="img/m2.jpg" onclick="abrirModal(this)" data-info="Obra 2<br>2026<br>"Acrílico y Óleo sobre tela">
  <img src="img/m3.jpg" onclick="abrirModal(this)" data-info="Obra 3<br>2026<br>"Acrílico y Óleo sobre tela">
  <img src="img/m4.jpg" onclick="abrirModal(this)" data-info="Obra 4<br>2023<br>"Acrílico retrato en vivo">

  <img src="img/m5.jpg" onclick="abrirModal(this)" data-info="Obra 5<br>2025<br>"Acrílico y Óleo sobre tela">
  <img src="img/m6.jpg" onclick="abrirModal(this)" data-info="Obra 6<br>2024<br>"Grafito sobre papel">
  <img src="img/m7.jpg" onclick="abrirModal(this)" data-info="Obra 7<br>2024<br>"Grafito sobre papel">
  <img src="img/m8.jpg" onclick="abrirModal(this)" data-info="Obra 8<br>2024<br>"Acrílico y Óleo sobre tela">
  <img src="img/m11.jpg" onclick="abrirModal(this)" data-info="Obra 8<br>2024<br>"Lapiz pasta sobre papel">
  <img src="img/m10.jpg" onclick="abrirModal(this)" data-info="Obra 8<br>2024<br>"Carboncillo sobre papel kraft">

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <img id="imgModal">
  <p id="textoModal"></p>
</div>

<div class="volver">
  <a href="index.html">Volver</a>
</div>

<script>

function abrirModal(img){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = img.src;
  document.getElementById("textoModal").innerHTML = img.dataset.info;
}

/* 🔥 evita que cierre al hacer click en la imagen */
document.getElementById("imgModal").onclick = function(e){
  e.stopPropagation();
};

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
