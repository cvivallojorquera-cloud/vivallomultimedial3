<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Galería</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>

body{
  margin: 0;
  background-color: #0A0F1C;
}

/* FONDO */
body::before{
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: url("img/Fondo.jpg");
  background-size: cover;
  background-position: center;
  opacity: 0.5;
  z-index: -1;
}

/* MARCO */
body::after{
  content:"";
  position: fixed;
  top: 15px;
  left: 15px;
  width: calc(100% - 30px);
  height: calc(100% - 30px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 
    0 0 10px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.03);
  pointer-events: none;
}

/* TITULO */
.title{
  color: white;
  height: 30vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Pirata One', cursive;
  font-size: 60px;
}

/* GALERIA */
.galeria{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
  gap: 20px;
  padding: 40px;
  margin: 40px;

  background-color: rgba(0,0,0,0.25);
}

/* IMAGENES */
.galeria img{
  width: 100%;
  height: 250px;
  object-fit: cover;

  filter: grayscale(100%);
  transition: 0.4s;
  cursor: pointer;
}

.galeria img:hover{
  filter: grayscale(0%);
  transform: scale(1.03);
}

/* VOLVER */
.volver{
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
}

.volver a{
  color: white;
  font-size: 22px;
  text-decoration: none;

  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 20px;

  font-family: 'Pirata One', cursive;

  transition: 0.4s;
}

.volver a:hover{
  border-color: white;
  transform: scale(1.05);
}

</style>

</head>

<body>

<div class="title">
  <h1>GALERÍA</h1>
</div>

<div class="galeria">
  <img src="img/m1.jpg">
  <img src="img/m2.jpg">
  <img src="img/m3.jpg">
  <img src="img/m4.jpg">
  <img src="img/m5.jpg">
  <img src="img/m6.jpg">
  <img src="img/m7.jpg">
  <img src="img/m8.jpg">
</div>

<div class="volver">
  <a href="index.html">Volver</a>
</div>

</body>

</html>
