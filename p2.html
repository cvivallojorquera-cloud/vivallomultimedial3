<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Galería</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>

body{
  margin: 0;
  background-color: #000; /* 👈 mejor para ver el fondo */
}

/* FONDO */
body::before{
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("img/Fondo.jpg");
  background-size: cover;
  background-position: center;
  opacity: 0.4;
  z-index: -2;
}

/* MARCO */
body::after{
  content:"";
  position: fixed;
  top: 15px;
  left: 15px;
  width: calc(100% - 30px);
  height: calc(100% - 30px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 
    0 0 10px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.03);
  pointer-events: none;
  z-index: 999;
}
  
/* TITULO */
.title{
  color: white;
  height: 20vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Pirata One', cursive;
  font-size: 60px;
}

/* PAGINAS */
.pagina{
  display: none;
}

.pagina.activa{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 40px;
}

/* IMAGENES */
.pagina img{
  width: 100%;
  height: 250px;
  object-fit: cover;
  filter: grayscale(100%);
  transition: 0.4s;
  cursor: pointer;
}

.pagina img:hover{
  filter: grayscale(0%);
  transform: scale(1.03);
}

/* PAGINACION */
.paginacion{
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 30px;
}

.paginacion button{
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 6px 12px;
  cursor: pointer;
  font-family: 'Pirata One', cursive;
}

.paginacion .activo{
  border-color: white;
}

/* BOTÓN VOLVER */
.volver{
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
}

.volver a{
  color: white;
  font-size: 20px;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 8px 20px;
  font-family: 'Pirata One', cursive;
  transition: 0.3s;
}

.volver a:hover{
  border-color: white;
  transform: scale(1.05);
}

/* MODAL */
.modal{
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 1000;
}

.modal img{
  max-width: 80%;
  max-height: 60vh;
}

.modal p{
  color: white;
  margin-top: 20px;
  font-family: 'Pirata One', cursive;
}

</style>
</head>

<body>

<div class="title">
  <h1>GALERÍA</h1>
</div>

<!-- PAGINA 1 -->
<div class="pagina activa">
  <img src="img/m2.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 3<br>2026<br>Óleo sobre Acrílico">
  <img src="img/m3.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 5<br>2026<br>Óleo sobre Acrílico">
  <img src="img/m5.jpg" onclick="abrirModal(this)" data-info="Habitación de carne<br>2025<br>Óleo sobre Acrílico">
  <img src="img/m8.jpg" onclick="abrirModal(this)" data-info="Sin nombre<br>2025<br>Óleo sobre Acrílico">
  <img src="img/m9.jpg" onclick="abrirModal(this)" data-info="Aquelarre<br>2024<br>Óleo sobre Acrílico">
  <img src="img/m17.jpg" onclick="abrirModal(this)" data-info="Bohemian Grove<br>2026<br>Óleo sobre Acrílico">
</div>

<!-- PAGINA 2 -->
<div class="pagina">
  <img src="img/m1.jpg" onclick="abrirModal(this)" data-info="Obra 4<br>2024<br>Grafito en papel">
  <img src="img/m6.jpg" onclick="abrirModal(this)" data-info="Obra 5<br>2024<br>Grafito en papel">
  <img src="img/m7.jpg" onclick="abrirModal(this)" data-info="Obra 6<br>2024<br>Grafito en papel">
  <img src="img/m14.jpg" onclick="abrirModal(this)" data-info="Obra 3<br>2024<br>Grafito en papel">
  <img src="img/m12.jpg" onclick="abrirModal(this)" data-info="Obra 3<br>2024<br>Grafito en papel">
</div>

<!-- PAGINA 3 -->
<div class="pagina">
  <img src="img/m10.jpg" onclick="abrirModal(this)" data-info="Obra 7<br>2024<br>Técnica mixta">
  <img src="img/m11.jpg" onclick="abrirModal(this)" data-info="Obra 8<br>2024<br>Técnica mixta">
  <img src="img/m13.jpg" onclick="abrirModal(this)" data-info="Obra 3<br>2024<br>Óleo sobre Acrílico">
  <img src="img/m16.jpg" onclick="abrirModal(this)" data-info="Obra 3<br>2024<br>Óleo sobre Acrílico">
</div>

<!-- BOTONES -->
<div class="paginacion">
  <button onclick="cambiarPagina(0)" class="activo">1</button>
  <button onclick="cambiarPagina(1)">2</button>
  <button onclick="cambiarPagina(2)">3</button>
</div>

<!-- VOLVER -->
<div class="volver">
  <a href="index.html">Volver</a>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <img id="imgModal">
  <p id="textoModal"></p>
</div>

<script>

function cambiarPagina(index){
  const paginas = document.querySelectorAll(".pagina");
  const botones = document.querySelectorAll(".paginacion button");

  paginas.forEach(p => p.classList.remove("activa"));
  botones.forEach(b => b.classList.remove("activo"));

  paginas[index].classList.add("activa");
  botones[index].classList.add("activo");
}

function abrirModal(img){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = img.src;
  document.getElementById("textoModal").innerHTML = img.dataset.info;
}

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
