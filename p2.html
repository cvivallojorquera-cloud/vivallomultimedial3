<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  background:#0A0F1C;
}

/* TITULO */
.title{
  color:white;
  height:20vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Pirata One';
  font-size:60px;
}

/* PAGINAS */
.pagina{ display:none; }

.pagina.activa{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:25px;
  padding:40px;
  max-width:1000px;
  margin:auto;
}

/* IMAGENES */
.pagina img{
  width:100%;
  height:260px;
  object-fit:cover;
  filter:grayscale(100%);
  cursor:pointer;
  transition:0.3s;
}

.pagina img:hover{
  filter:grayscale(0%);
  transform:scale(1.03);
}

/* CARPETAS */
.paginacion{
  display:flex;
  justify-content:center;
  gap:20px;
}

.carpeta{
  width:120px;
  height:70px;
  background:#111;
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  cursor:pointer;
  font-family:'Pirata One';
}

.carpeta.activa{
  border-color:white;
}

/* BOTONES */
.navegacion{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:30px;
}

button{
  background:transparent;
  border:1px solid white;
  color:white;
  padding:8px 15px;
  cursor:pointer;
}

button:disabled{
  opacity:0.3;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.modal img{
  max-width:80%;
}

.modal p{
  color:white;
}

</style>
</head>

<body>

<div class="title">GALERÍA</div>

<!-- PAGINAS -->
<div class="pagina activa">
  <img src="img/m2.jpg" onclick="abrirModal(this)" data-info="Pintura 1">
  <img src="img/m3.jpg" onclick="abrirModal(this)" data-info="Pintura 2">
  <img src="img/m4.jpg" onclick="abrirModal(this)" data-info="Pintura 3">
</div>

<div class="pagina">
  <img src="img/m1.jpg" onclick="abrirModal(this)" data-info="Grafito 1">
  <img src="img/m6.jpg" onclick="abrirModal(this)" data-info="Grafito 2">
</div>

<div class="pagina">
  <img src="img/m10.jpg" onclick="abrirModal(this)" data-info="Otro 1">
  <img src="img/m11.jpg" onclick="abrirModal(this)" data-info="Otro 2">
</div>

<!-- BOTONES DINAMICOS -->
<div class="navegacion">
  <button id="prev"></button>
  <button id="next"></button>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <img id="imgModal">
  <p id="textoModal"></p>
</div>

<script>

let paginaActual = 0;
const nombres = ["PINTURA","GRAFITO","OTROS"];

function cambiarPagina(i){
  const paginas = document.querySelectorAll(".pagina");
  const carpetas = document.querySelectorAll(".carpeta");

  paginas.forEach(p=>p.classList.remove("activa"));
  carpetas.forEach(c=>c.classList.remove("activa"));

  paginas[i].classList.add("activa");
  carpetas[i].classList.add("activa");

  paginaActual = i;
  actualizar();
}

function actualizar(){
  const prev = document.getElementById("prev");
  const next = document.getElementById("next");

  prev.innerHTML = paginaActual>0 ? "← "+nombres[paginaActual-1] : "—";
  next.innerHTML = paginaActual<2 ? nombres[paginaActual+1]+" →" : "—";

  prev.disabled = paginaActual===0;
  next.disabled = paginaActual===2;
}

document.getElementById("prev").onclick=()=>cambiarPagina(paginaActual-1);
document.getElementById("next").onclick=()=>cambiarPagina(paginaActual+1);

function abrirModal(img){
  modal.style.display="flex";
  imgModal.src=img.src;
  textoModal.innerHTML=img.dataset.info;
}

function cerrarModal(){
  modal.style.display="none";
}

actualizar();

</script>

</body>
</html>
