<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Galería</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>

body{
  margin: 0;
  background-color: #0A0F1C;
}

/* TITULO */
.title{
  color: white;
  height: 20vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Pirata One', cursive;
  font-size: 60px;
}

/* PAGINAS */
.pagina{
  display: none;
}

.pagina.activa{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 40px;
}

/* IMAGENES */
.pagina img{
  width: 100%;
  height: 250px;
  object-fit: cover;
  filter: grayscale(100%);
  transition: 0.4s;
  cursor: pointer;
}

.pagina img:hover{
  filter: grayscale(0%);
  transform: scale(1.03);
}

/* CARPETAS */
.paginacion{
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 50px;
}

.carpeta{
  width: 120px;
  height: 70px;
  background: #111;
  border: 1px solid rgba(255,255,255,0.2);
  position: relative;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Pirata One', cursive;
  color: white;
  transition: 0.3s;
}

.carpeta::before{
  content: "";
  position: absolute;
  top: -10px;
  left: 10px;
  width: 40px;
  height: 15px;
  background: #111;
  border: 1px solid rgba(255,255,255,0.2);
  border-bottom: none;
}

.carpeta:hover{
  transform: translateY(-5px);
  border-color: white;
}

.carpeta.activa{
  border-color: white;
  background: #1a1a1a;
}

/* MODAL */
.modal{
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.modal img{
  max-width: 80%;
  max-height: 60vh;
}

.modal p{
  color: white;
  margin-top: 20px;
  font-family: 'Pirata One', cursive;
}

</style>
</head>

<body>

<div class="title">
  <h1>GALERÍA</h1>
</div>

<!-- PAGINA 1 -->
<div class="pagina activa">
  <img src="img/m2.jpg" onclick="abrirModal(this)" data-info="Sid Vicious<br>2024<br>Acrílico y Óleo sobre tela"">
  <img src="img/m3.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 3<br>2026<br>Acrílico y Óleo sobre tela">
  <img src="img/m4.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 5<br>2026<br>Acrílico y Óleo sobre tela">
  <img src="img/m5.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 5<br>2026<br>Acrílico y Óleo sobre tela">
  <img src="img/m8.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 5<br>2026<br>Acrílico y Óleo sobre tela">
  <img src="img/m9.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 5<br>2026<br>Acrílico y Óleo sobre tela">
  <img src="m17.jpg.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 5<br>2026<br>Acrílico y Óleo sobre tela">
  
</div>

<!-- PAGINA 2 -->
<div class="pagina">
  <img src="img/m1.jpg" onclick="abrirModal(this)" data-info="Sin nombre<br>2023<br>Grafito sobre papelo">
  <img src="img/m6.jpg" onclick="abrirModal(this)" data-info="Habitacion de Carne<br>2025<br>Grafito sobre papel">
  <img src="img/m7.jpg" onclick="abrirModal(this)" data-info="Vampira<br>2024<br>Grafito sobre papel">
  <img src="img/m14.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 5<br>2026<br>Grafito sobre papel">
</div>

<!-- PAGINA 3 -->
<div class="pagina">
  <img src="img/m10.jpg" onclick="abrirModal(this)" data-info="Identidad 2<br>2024<br>Grafito sobre papel">
  <img src="img/m11.jpg" onclick="abrirModal(this)" data-info="Sin Nombre<br>2024<br>Acrílico y Óleo sobre tela">
    <img src="img/m13.jpg" onclick="abrirModal(this)" data-info="Multiespecie<br>2024<br>Carboncillo sobre papel kraft">
    <img src="img/m16.jpg" onclick="abrirModal(this)" data-info="Santx<br>2024<br>Lapiz pasta en papel"">
</div>

<!-- CARPETAS -->
<div class="paginacion">
  <div class="carpeta activa" onclick="cambiarPagina(0)"> PINTURA </div>
  <div class="carpeta" onclick="cambiarPagina(1)"> GRAFITO </div>
  <div class="carpeta" onclick="cambiarPagina(2)"> OTROS </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <img id="imgModal">
  <p id="textoModal"></p>
</div>

<script>

/* CAMBIO DE PAGINA */
function cambiarPagina(index){
  const paginas = document.querySelectorAll(".pagina");
  const carpetas = document.querySelectorAll(".carpeta");

  paginas.forEach(p => p.classList.remove("activa"));
  carpetas.forEach(c => c.classList.remove("activa"));

  paginas[index].classList.add("activa");
  carpetas[index].classList.add("activa");
}

/* MODAL */
function abrirModal(img){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = img.src;
  document.getElementById("textoModal").innerHTML = img.dataset.info;
}

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
