<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Galería</title>

<style>


body{
  margin: 0;
   background-color: #0A0F1C;
  position: relative;
  z-index: 0;
}


body::before{
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background-image: url("img/Fondo.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  opacity: 0.5;

  z-index: -1;
}

.title{
  color: rgb(255, 255, 255);
  margin: 0;
  height: 30vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Times New Roman";
  font-size: 60px;
}

.title2{
  color: rgb(255, 255, 255);
  margin: 0;
  height: 10vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: monospace;
  font-size: 30px;
}

  /* MARCO */
body::after{
  content:"";
  position: fixed;
  top: 15px;
  left: 15px;
  width: calc(100% - 30px);
  height: calc(100% - 30px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 
    0 0 10px rgba(255,255,255,0.05),
    inset 0 0 20px rgba(255,255,255,0.03);
  pointer-events: none;
}
.galeria{
  display: grid;
  grid-template-columns: repeat(4, 1fr); 
  gap: 20px;
  padding: 40px;

  background-color: rgba(0,0,0,0.3);
  border-radius: 0px;
  margin: 40px;
}

.galeria img{
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 0px;

  transition: transform 0.3s ease;
}




/* BOTÓN VOLVER */
.volver{
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
}
}

.volver a{
  color: rgb(255, 255, 255);
  font-size: 25px;
  text-decoration: none;
  background-color: #8a87e9b9;
  padding: 10px 20px;
  border-radius: 0px;
}

</style>

</head>

<body>

<div class="title">
  <h1>GALERÍA</h1>
</div>



<div class="galeria">

  <img src="img/m1.jpg">
  <img src="img/m2.jpg">
  <img src="img/m3.jpg">
  <img src="img/m4.jpg">

  <img src="img/m5.jpg">
  <img src="img/m6.jpg">
  <img src="img/m7.jpg">
  <img src="img/m8.jpg">

</div>


<div class="volver">
  <a href="index.html">Volver</a>
</div>

</body>

</html>
