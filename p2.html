<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Galería</title>

<link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">

<style>

body{
  margin: 0;
  background-color: #0A0F1C;
}

/* TITULO */
.title{
  color: white;
  height: 20vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Pirata One', cursive;
  font-size: 60px;
}

/* CONTENEDORES (PAGINAS) */
.pagina{
  display: none; /* 👈 importante */
}

.pagina.activa{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 40px;
}

/* IMAGENES */
.pagina img{
  width: 100%;
  height: 250px;
  object-fit: cover;
  filter: grayscale(100%);
  transition: 0.4s;
  cursor: pointer;
}

.pagina img:hover{
  filter: grayscale(0%);
  transform: scale(1.03);
}

/* PAGINACION */
.paginacion{
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 40px;
}

.paginacion button{
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 6px 12px;
  cursor: pointer;
  font-family: 'Pirata One', cursive;
}

.paginacion .activo{
  border-color: white;
}

/* MODAL */
.modal{
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.modal img{
  max-width: 80%;
  max-height: 60vh;
}

.modal p{
  color: white;
  margin-top: 20px;
  font-family: 'Pirata One', cursive;
}

</style>
</head>

<body>

<div class="title">
  <h1>GALERÍA</h1>
</div>

<!-- PAGINA 1 -->
<div class="pagina activa">
  <img src="img/m2.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 3<br>2026<br>Oleo sobre Acrilico">
  <img src="img/m3.jpg" onclick="abrirModal(this)" data-info="Milk Moustache 5<br>2026<br>Oleo sobre Acrilico">
   <img src="img/m5.jpg" onclick="abrirModal(this)" data-info="Habitacion de carne<br>2025<br>Oleo sobre Acrilico">
   <img src="img/m8.jpg" onclick="abrirModal(this)" data-info="Sin nombre<br>2025<br>Oleo sobre Acrilico">
   <img src="img/m9.jpg" onclick="abrirModal(this)" data-info="Aquelarre<br>2024<br>Oleo sobre Acrilico">
   <img src="img/m17.jpg.jpg" onclick="abrirModal(this)" data-info="Bohemian Grove<br>2026<br>Oleo sobre Acrilico">
</div>

<!-- PAGINA 2 -->
<div class="pagina">
  <img src="img/m1.jpg" onclick="abrirModal(this)" data-info="Obra 4<br>2024<br>Grafito en papel">
  <img src="img/m6.jpg" onclick="abrirModal(this)" data-info="Obra 5<br>2024<br>Grafito en papel">
  <img src="img/m7.jpg" onclick="abrirModal(this)" data-info="Obra 6<br>2024<br>Grafito en papel">
   <img src="img/m14.jpg" onclick="abrirModal(this)" data-info="Obra 3<br>2024<br>Grafito en papel">
   <img src="img/m12.jpg" onclick="abrirModal(this)" data-info="Obra 3<br>2024<br>Grafito en papael">
  
</div>

<!-- PAGINA 3 -->
<div class="pagina">
  <img src="img/m10.jpg" onclick="abrirModal(this)" data-info="Obra 7<br>2024<br>Técnica">
  <img src="img/m11.jpg" onclick="abrirModal(this)" data-info="Obra 8<br>2024<br>Técnica">
   <img src="img/m13.jpg" onclick="abrirModal(this)" data-info="Obra 3<br>2024<br>Oleo sobre Acrilico">
   <img src="img/m16.jpg" onclick="abrirModal(this)" data-info="Obra 3<br>2024<br>Oleo sobre Acrilico">
</div>

<!-- BOTONES -->
<div class="paginacion">
  <button onclick="cambiarPagina(0)" class="activo">1</button>
  <button onclick="cambiarPagina(1)">2</button>
  <button onclick="cambiarPagina(2)">3</button>
</div>

  /* BOTÓN VOLVER */
.volver{
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
  
<!-- MODAL -->
<div id="modal" class="modal" onclick="cerrarModal()">
  <img id="imgModal">
  <p id="textoModal"></p>
</div>

<script>

/* CAMBIO DE PAGINA */
function cambiarPagina(index){
  const paginas = document.querySelectorAll(".pagina");
  const botones = document.querySelectorAll(".paginacion button");

  paginas.forEach(p => p.classList.remove("activa"));
  botones.forEach(b => b.classList.remove("activo"));

  paginas[index].classList.add("activa");
  botones[index].classList.add("activo");
}

/* MODAL */
function abrirModal(img){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imgModal").src = img.src;
  document.getElementById("textoModal").innerHTML = img.dataset.info;
}

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
